# NII-node run config for the IMO-2026 deploy baseline (venv run, not Docker).
# = config.yaml, but with model paths pointed at the node's /tmp/chankhavu/models
# and max_rounds: 4 to match Geremie's live IMO-2026 run.
#
# To run the other checkpoints, change ONLY models.bf16_target to:
#   /tmp/chankhavu/models/opd-32b-bf16-step-225   (then step-125, optionally step-250)
# The draft is shared; traces auto-namespace by target folder name (run_name: "").
schema_version: 12

models:
  bf16_target: /tmp/chankhavu/models/opd-32b-deploy
  # quantized_* are inactive (quantized: false); paths must be absolute per schema.
  quantized_target: /tmp/chankhavu/models/opd-32b-v33-s200-gptq-w4a16
  bf16_draft: /tmp/chankhavu/models/dflash-32b-draft-v2test-phaseL
  quantized_draft: /tmp/chankhavu/models/dflash-32b-draft-v2test-phaseL-int4mlp

model:
  tensor_parallel_size: 2
  data_parallel_size: 4
  quantized: false
  dflash: true
  kv_cache_dtype: auto

server:
  attention_backend: fa3
  page_size: 1
  deterministic_inference: true
  host: 127.0.0.1
  port: 30000
  context_length: 262144
  mem_fraction_static: 0.82
  max_running_requests: 64
  swa_full_tokens_ratio: 0.2
  chunked_prefill_size: 2048
  stream_interval: 16
  prefill_cuda_graph_backend: tc_piecewise
  dflash_block_size: 8
  dflash_num_draft_tokens: 8
  dflash_window_size: 512

search:
  proofs_per_round: 32
  verifications_per_proof: 16
  top_proofs: 8
  # Gold-style refinement: each of proofs_per_round refine calls merges
  # refine_parents stratified-random parents from the top_proofs pool, each with
  # up to reviews_per_refine_parent random non-ideal reviews.
  refine_parents: 4
  reviews_per_refine_parent: 3
  refine_review_strategy: random_nonideal
  # Total rounds: round 1 = initial 32-proof generation, rounds 2..N = self-
  # refinement. 4 => 1 generation + up to 3 refinement rounds (matches Geremie).
  max_rounds: 4
  early_stop_threshold: 0.99999
  temperature: 1.0
  top_p: 0.95
  max_completion_tokens: 128000
  solution_continuation_tokens: 16384
  verifier_continuation_tokens: 16384
  min_valid_verifications: 4
  # GOLD: feed prover self-eval to the verifier (in-distribution). Keep true.
  verifier_sees_self_evaluation: true
  # GOLD: drop parent self-eval from the refiner bundle (unreliable). Keep false.
  refiner_sees_self_evaluation: false
  # GOLD: search-based lenient extraction (recovers missing </solution> etc).
  lenient_parsing: true
  request_timeout_seconds: 86400
  concurrency: 96
  seed: 0

# Periodic reasoning-trace upload to HF. Auth in secrets_file (NOT here).
traces:
  enabled: true
  dataset_repo: chankhavu/imo-reasoning-traces
  secrets_file: /tmp/chankhavu/SECRETS.json
  interval_seconds: 600
  private: false
  run_name: ""   # "" -> derive from target folder (opd-32b-deploy / -step-225 / ...)
