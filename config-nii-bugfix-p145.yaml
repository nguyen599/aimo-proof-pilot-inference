# NII-node run config for the IMO-2026 "bugfix merge" checkpoint, P1/P4/P5
# quick-benchmark (venv run, not Docker). = config-nii-r4.yaml, but
# bf16_target -> opd-32b-bf16-merged-125-to-225-bugfix and full production search
# (max_rounds 4). Selection of P1/P4/P5 is a RUN-TIME flag on run_submission.py
# (--problems 1,4,5), NOT baked into this config, so the same config runs any
# subset. run_name here is the BASE; each invocation appends a unique timestamp
# suffix for a unique HF trace dir (this run used
# imo2026-bugfix-p145-20260719-231751). See evaluation/EXPERIMENTS.md.
schema_version: 12

models:
  bf16_target: /tmp/chankhavu/models/opd-32b-bf16-merged-125-to-225-bugfix
  # quantized_* are inactive (quantized: false); paths must be absolute per schema.
  quantized_target: /tmp/chankhavu/models/opd-32b-v33-s200-gptq-w4a16
  bf16_draft: /tmp/chankhavu/models/dflash-32b-draft-v2test-phaseL
  quantized_draft: /tmp/chankhavu/models/dflash-32b-draft-v2test-phaseL-int4mlp

model:
  tensor_parallel_size: 2
  data_parallel_size: 4
  quantized: false
  dflash: true
  kv_cache_dtype: auto

server:
  attention_backend: fa3
  page_size: 1
  deterministic_inference: false
  host: 127.0.0.1
  port: 30000
  context_length: 262144
  mem_fraction_static: 0.82
  max_running_requests: 64
  swa_full_tokens_ratio: 0.2
  chunked_prefill_size: 2048
  stream_interval: 16
  # sglang scheduler watchdog (seconds); SGLang default 300 crashed on a long P6 gen. See evaluation/DEGENERATE_FILTER.md
  watchdog_timeout: 1200
  prefill_cuda_graph_backend: tc_piecewise
  dflash_block_size: 8
  dflash_num_draft_tokens: 8
  dflash_window_size: 512

search:
  proofs_per_round: 32
  verifications_per_proof: 16
  top_proofs: 8
  refine_parents: 4
  reviews_per_refine_parent: 3
  refine_review_strategy: random_nonideal
  max_rounds: 4
  early_stop_threshold: 0.99999
  temperature: 1.0
  top_p: 0.95
  max_completion_tokens: 128000
  solution_continuation_tokens: 16384
  verifier_continuation_tokens: 16384
  min_valid_verifications: 4
  verifier_sees_self_evaluation: true
  refiner_sees_self_evaluation: false
  lenient_parsing: true
  # gzip degenerate-loop filter (distribution-neutral, not a repetition penalty); false disables. See evaluation/DEGENERATE_FILTER.md
  filter_degenerate: true
  # real-time streaming loop detection + salvage; false = plain blocking calls (post-hoc filter still applies). See evaluation/DEGENERATE_FILTER.md
  stream_detect: true
  request_timeout_seconds: 86400
  concurrency: 96
  seed: 0

traces:
  enabled: true
  dataset_repo: imo2026-challenge/chankhavu-imo-reasoning-traces
  secrets_file: ""
  interval_seconds: 600
  private: true
  # BASE name; each run appends a unique timestamp suffix (see header).
  run_name: imo2026-bugfix-p145
