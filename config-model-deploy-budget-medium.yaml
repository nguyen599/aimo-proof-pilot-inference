# IMO-2026 budget-scaling experiment: deploy checkpoint, medium search budget.
# One of config-model-{deploy,step225}-budget-{medium,high,xhigh}.yaml. These 6 configs
# vary ONLY the search budget; refine_parents(4) x reviews_per_refine_parent(3) =
# the training limit is held constant, as are the server topology and the selector.
# medium: proofs_per_round=32, verifications_per_proof=16,
#     top_proofs=8, refine_parents=4, reviews_per_refine_parent=3, max_rounds=4.
schema_version: 12

models:
  bf16_target: /workspace/models/opd-32b-deploy
  # quantized_* are inactive (quantized: false); paths must be absolute per schema.
  quantized_target: /workspace/models/opd-32b-v33-s200-gptq-w4a16
  bf16_draft: /workspace/models/dflash-32b-draft-v2test-phaseL
  quantized_draft: /workspace/models/dflash-32b-draft-v2test-phaseL-int4mlp

model:
  tensor_parallel_size: 2
  data_parallel_size: 4
  quantized: false
  dflash: true
  kv_cache_dtype: auto

server:
  attention_backend: fa3
  page_size: 1
  deterministic_inference: false
  host: 127.0.0.1
  port: 30000
  context_length: 262144
  mem_fraction_static: 0.82
  max_running_requests: 64
  swa_full_tokens_ratio: 0.2
  chunked_prefill_size: 2048
  stream_interval: 16
  # sglang scheduler watchdog (seconds); SGLang default 300 crashed on a long P6 gen. See evaluation/DEGENERATE_FILTER.md
  watchdog_timeout: 1200
  prefill_cuda_graph_backend: tc_piecewise
  dflash_block_size: 8
  dflash_num_draft_tokens: 8
  dflash_window_size: 512

search:
  proofs_per_round: 32
  verifications_per_proof: 16
  top_proofs: 8
  # Gold-style refinement: each of proofs_per_round refine calls merges
  # refine_parents stratified-random parents from the top_proofs pool, each with
  # up to reviews_per_refine_parent random non-ideal reviews.
  refine_parents: 4
  reviews_per_refine_parent: 3
  refine_review_strategy: random_nonideal
  # Total rounds: round 1 = initial 32-proof generation, rounds 2..N = self-
  # refinement. 4 => 1 generation + up to 3 refinement rounds.
  max_rounds: 4
  early_stop_threshold: 0.99999
  temperature: 1.0
  top_p: 0.95
  max_completion_tokens: 128000
  solution_continuation_tokens: 16384
  verifier_continuation_tokens: 16384
  min_valid_verifications: 4
  # GOLD: feed prover self-eval to the verifier (in-distribution). Keep true.
  verifier_sees_self_evaluation: true
  # GOLD: drop parent self-eval from the refiner bundle (unreliable). Keep false.
  refiner_sees_self_evaluation: false
  # GOLD: search-based lenient extraction (recovers missing </solution> etc).
  lenient_parsing: true
  # gzip degenerate-loop filter (distribution-neutral, not a repetition penalty); false disables. See evaluation/DEGENERATE_FILTER.md
  filter_degenerate: true
  # real-time streaming loop detection + salvage; false = plain blocking calls (post-hoc filter still applies). See evaluation/DEGENERATE_FILTER.md
  stream_detect: true
  request_timeout_seconds: 86400
  concurrency: 96
  seed: 0
  # LLM final-solution selector (ycchen gold select-by-id): selection_votes shuffled
  # ballots over the top selection_candidates proofs, majority vote; a ballot that
  # rambles to selection_max_tokens is force-closed (</think> + <selected_id>) so it
  # still votes. selection_candidates is decoupled from top_proofs (trained regime ~4).
  llm_selector: true
  selection_votes: 16
  selection_candidates: 4
  selection_max_tokens: 56000
  selection_continuation_tokens: 2048
  # Tiered tournament selection (default-on; pinned here for reproducible cost).
  # When the verifier SATURATES -- more than selection_candidates proofs at score
  # >= selection_tournament_threshold -- play selection_tournament_rounds stratified
  # brackets of selection_candidates proofs and submit the one that wins the most;
  # otherwise the majority vote above, restricted to proofs with score >=
  # best * (1 - selection_score_window) (a fraction of the best, not absolute).
  selection_tournament: true
  selection_tournament_threshold: 0.95
  selection_tournament_rounds: 32
  selection_tournament_max_candidates: 10
  selection_score_window: 0.2

# Optional: periodically push the whole artifacts tree (reasoning traces) to a HF
# dataset. Auth: secrets_file (a JSON/YAML file with an hf_token) OR, if
# secrets_file is "", the ambient HF token (HF_TOKEN env or `hf auth login`).
# Upload runs every interval_seconds and once at shutdown; errors never abort the
# run. Remove this whole section to disable.
traces:
  enabled: true
  # Alias-prefixed so it doesn't collide with teammates' datasets in the org.
  dataset_repo: imo2026-challenge/chankhavu-imo-reasoning-traces
  # "" -> use the ambient HF token (HF_TOKEN env or `hf auth login`).
  secrets_file: ""
  interval_seconds: 600
  # Applied only when the dataset is first CREATED (team competition traces).
  private: true
  # Subfolder per experiment. "" -> derive from the target model folder; set an
  # explicit name to label each experiment.
  run_name: imo2026-deploy-budget-medium
